name: Run Seyd‑Yaar Daily

on:
  workflow_dispatch:
  schedule:
    # 00:00 UTC daily
    - cron: "0 0 * * *"

jobs:
  run:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    env:
      # Copernicus Marine credentials (set as GitHub Secrets)
      COPERNICUSMARINE_SERVICE_USERNAME: ${{ secrets.COPERNICUSMARINE_SERVICE_USERNAME }}
      COPERNICUSMARINE_SERVICE_PASSWORD: ${{ secrets.COPERNICUSMARINE_SERVICE_PASSWORD }}

      # Keep strict mode ON: if Copernicus download fails, pipeline should flag it.
      SEYDYAAR_STRICT_COPERNICUS: "1"

      # Tunables (optional)
      SEYDYAAR_PAST_DAYS: "2"
      SEYDYAAR_FUTURE_DAYS: "8"
      SEYDYAAR_STEP_HOURS: "6"
      SEYDYAAR_GRID: "220x220"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -U copernicusmarine

      - name: Prepare latest dirs (always create real files)
        run: |
          rm -rf docs/latest/verify || true
          rm -rf docs/latest/logs || true
          mkdir -p docs/latest/logs docs/latest/verify
          echo "keep" > docs/latest/logs/keep.txt
          echo "keep" > docs/latest/verify/keep.txt

      - name: Run daily
        shell: bash
        run: |
          set -euo pipefail
          export PYTHONPATH="$GITHUB_WORKSPACE/backend"
          python -m seydyaar run-daily             --out docs/latest             --past-days "${SEYDYAAR_PAST_DAYS}"             --future-days "${SEYDYAAR_FUTURE_DAYS}"             --step-hours "${SEYDYAAR_STEP_HOURS}"             --grid "${SEYDYAAR_GRID}"

      - name: Upload logs + verify (even on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seydyaar_verify_and_logs
          path: |
            docs/latest/logs/**
            docs/latest/verify/**
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

      - name: Commit latest to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/latest
          git commit -m "Update docs/latest (auto)" || echo "No changes to commit"
          git push
